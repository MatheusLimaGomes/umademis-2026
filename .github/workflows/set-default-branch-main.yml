name: Set Default Branch to main

on:
  push:
    branches:
      - chore/github-workflow
    paths:
      - .github/workflows/set-default-branch-main.yml
  workflow_dispatch:

permissions:
  administration: write

jobs:
  set-default-branch:
    name: Set main as default branch
    runs-on: ubuntu-latest
    steps:
      - name: Set default branch to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method PATCH \
            /repos/${{ github.repository }} \
            -f default_branch=main
          echo "Default branch set to main successfully."
