name: Open PR from Feature

on:
  push:
    branches:
      - feature/**

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr-from-feature:
    name: Open PR to main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"

          EXISTING_PR=$(gh pr list \
            --head "$BRANCH" \
            --base main \
            --json number \
            --jq '.[0].number' 2>/dev/null || true)

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR ja existe para a branch $BRANCH"
          else
            gh pr create \
              --head "$BRANCH" \
              --base main \
              --title "$BRANCH -> main" \
              --body "PR automatico gerado pelo fluxo trunk-based.

- Branch de origem: \`$BRANCH\`
- Branch de destino: \`main\`

Apos aprovacao, o merge sera executado automaticamente por este workflow."
          fi
