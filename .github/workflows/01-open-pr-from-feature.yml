name: Open PR from Feature

on:
  push:
    branches:
      - feature/**

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr-from-feature:
    name: Open PR to main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open or update PR
        uses: repo-sync/pull-request@v2
        with:
          source_branch: ${{ github.ref_name }}
          destination_branch: main
          pr_title: "${{ github.ref_name }} -> main"
          pr_body: |
            PR automatico gerado pelo fluxo trunk-based.

            - Branch de origem: `${{ github.ref_name }}`
            - Branch de destino: `main`

            Apos aprovacao, o merge sera executado automaticamente por este workflow.
          github_token: ${{ secrets.GITHUB_TOKEN }}
